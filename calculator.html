<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Calculator</title>\n    <style>\n        body { font-family: Arial, sans-serif; }\n        #display { width: 100%; height: 50px; font-size: 24px; }\n        button { width: 25%; height: 50px; font-size: 24px; }\n    </style>\n</head>\n<body>\n    <h1>Calculator</h1>\n    <input type="text" id="display" disabled>\n    <div>\n        <button onclick="clearDisplay()">C</button>\n        <button onclick="appendToDisplay('7')">7</button>\n        <button onclick="appendToDisplay('8')">8</button>\n        <button onclick="appendToDisplay('9')">9</button>\n        <button onclick="appendToDisplay('/')">/</button>\n    </div>\n    <div>\n        <button onclick="appendToDisplay('4')">4</button>\n        <button onclick="appendToDisplay('5')">5</button>\n        <button onclick="appendToDisplay('6')">6</button>\n        <button onclick="appendToDisplay('*')">*</button>\n    </div>\n    <div>\n        <button onclick="appendToDisplay('1')">1</button>\n        <button onclick="appendToDisplay('2')">2</button>\n        <button onclick="appendToDisplay('3')">3</button>\n        <button onclick="appendToDisplay('-')">-</button>\n    </div>\n    <div>\n        <button onclick="appendToDisplay('0')">0</button>\n        <button onclick="calculate()">=</button>\n        <button onclick="appendToDisplay('+')">+</button>\n    </div>\n    <div>\n        <input type="text" id="binary" placeholder="Binary">\n        <input type="text" id="hexadecimal" placeholder="Hexadecimal">\n        <input type="text" id="octal" placeholder="Octal">\n        <input type="text" id="decimal" placeholder="Decimal">\n    </div>\n    <script>\n        function appendToDisplay(value) {\n            document.getElementById('display').value += value;\n        }\n        function clearDisplay() {\n            document.getElementById('display').value = '';\n            clearConversions();\n        }\n        function calculate() {\n            const display = document.getElementById('display');\n            try {\n                display.value = eval(display.value);\n                convertNumber(display.value);\n            } catch (e) {\n                display.value = 'Error';\n            }\n        }\n        function convertNumber(number) {\n            document.getElementById('binary').value = Number(number).toString(2);\n            document.getElementById('hexadecimal').value = Number(number).toString(16).toUpperCase();\n            document.getElementById('octal').value = Number(number).toString(8);\n            document.getElementById('decimal').value = number;\n        }\n        function clearConversions() {\n            document.getElementById('binary').value = '';\n            document.getElementById('hexadecimal').value = '';\n            document.getElementById('octal').value = '';\n            document.getElementById('decimal').value = '';\n        }\n    <\/script>\n</body>\n</html>
